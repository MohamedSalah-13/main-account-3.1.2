# Database Configuration
# MySQL Configuration (Production)
db.driver=com.mysql.cj.jdbc.Driver
db.url=jdbc:mysql://localhost:3306/account_system_db
db.host=localhost
db.port=3306
db.name=account_system_db

db.username=<DB_USERNAME>
db.password=<DB_PASSWORD>

# Connection Pool Settings
db.pool.minSize=5
db.pool.maxSize=20
db.pool.timeout=30000

# MySQL Backup Settings
mysql.use.path.variable=true
mysql.dump.path=mysqldump
mysql.command.path=mysql
mysql.local.path=mysql
